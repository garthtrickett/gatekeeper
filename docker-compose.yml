services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JDBC_DATABASE_URL=jdbc:postgresql://db:5432/gatekeeper
      - JDBC_DATABASE_USER=postgres
      - JDBC_DATABASE_PASSWORD=gatekeeper_password
      - JWT_SECRET=${JWT_SECRET:-default-secret-for-development}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=gatekeeper
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=gatekeeper_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
